<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chetan Baviskar | Software Engineer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: black;
            color: cyan;
            overflow-x: hidden;
        }

        nav {
            width: 100%;
            padding: 20px 8%;
            border-bottom: 2px solid cyan;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            background: black;
            z-index: 1000;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            color: cyan;
        }

        .nav-links {
            display: flex;
            gap: 25px;
        }

        .nav-links a {
            text-decoration: none;
            color: cadetblue;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: cyan;
        }

        .hamburger {
            display: none;
            font-size: 35px;
            cursor: pointer;
            color: cyan;
        }

        .mobile-menu {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            height: 100vh;
            background: black;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: 0.5s;
            z-index: 2000;
        }

        .mobile-menu a {
            text-decoration: none;
            color: cyan;
            font-size: 28px;
            margin: 18px 0;
        }

        .show {
            right: 0;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 40px;
            cursor: pointer;
            color: cyan;
        }

        #home {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 100px 8%;
            background:
                linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)),
                url('https://mcdn.wallpapersafari.com/medium/4/46/9NwMcS.jpg');

            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .hero-text h1 {
            font-size: 65px;
            margin-bottom: 20px;
            color: white;
        }

        .hero-text span {
            color: cyan;
        }

        .hero-text h2 {
            font-size: 32px;
            color: cadetblue;
            margin-bottom: 20px;
        }

        .hero-text p {
            max-width: 800px;
            margin: auto;
            font-size: 18px;
            line-height: 1.9;
            color: bisque;
            margin-bottom: 35px;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .buttons a {
            text-decoration: none;
            color: cyan;
            border: 2px solid cyan;
            padding: 14px 28px;
            border-radius: 10px;
            transition: 0.3s;
        }

        .buttons a:hover {
            background: cyan;
            color: black;
        }

        #about {
            padding: 90px 8%;
            background: black;
        }

        .about-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 60px;
        }

        .about-text {
            flex: 1;
        }

        .about-text h1 {
            font-size: 50px;
            margin-bottom: 25px;
            color: cyan;
        }

        .about-text p {
            font-size: 18px;
            line-height: 1.9;
            margin-bottom: 22px;
            color: bisque;
        }

        .about-image {
            flex: 1;
            display: flex;
            justify-content: center;
        }

        .about-image img {
            width: 100%;
            max-width: 360px;
            border-radius: 25px;
            border: 3px solid cyan;
        }

        @media(max-width:992px) {

            .nav-links {
                display: none;
            }

            .hamburger {
                display: block;
            }

            .hero-text h1 {
                font-size: 42px;
            }

            .hero-text h2 {
                font-size: 24px;
            }

            .hero-text p {
                font-size: 16px;
            }

            .about-container {
                flex-direction: column;
                text-align: center;
            }

            .about-text h1 {
                font-size: 38px;
            }

            .about-text p {
                font-size: 16px;
            }

            .about-image img {
                max-width: 250px;
            }

        }
    </style>
</head>

<body>

    <nav>

        <div class="logo">
            Chetan Baviskar
        </div>

        <div class="nav-links">
            <a href="portfolio.html">HOME</a>
            <a href="aboutme.html">ABOUT</a>
            <a href="skills.html">SKILLS</a>
            <a href="certification.html">CERTIFICATION</a>
            <a href="projects.html">PROJECTS</a>
            <a href="education.html">EDUCATION</a>
            <a href="experience.html">EXPERIENCE</a>
            <a href="contact.html">CONTACT</a>
        </div>

        <div class="hamburger" onclick="openMenu()">
            ☰
        </div>

    </nav>

    <div class="mobile-menu" id="menu">

        <div class="close-btn" onclick="closeMenu()">
            ✕
        </div>

        <a href="portfolio.html">HOME</a>
        <a href="aboutme.html">ABOUT</a>
        <a href="skills.html">SKILLS</a>
        <a href="certification.html">CERTIFICATION</a>
        <a href="projects.html">PROJECTS</a>
        <a href="education.html">EDUCATION</a>
        <a href="experience.html">EXPERIENCE</a>
        <a href="contact.html">CONTACT</a>

    </div>
    <script>

        function openMenu() {
            document.getElementById("menu").classList.add("show");
        }

        function closeMenu() {
            document.getElementById("menu").classList.remove("show");
        }

    </script>

</body>

</html>
